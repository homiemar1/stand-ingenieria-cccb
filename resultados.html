<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Muro de Ideas - CCCB</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 40px; overflow-x: hidden; }
    header { text-align: center; margin-bottom: 20px; }
    h1 { color: #38bdf8; font-size: 2.5rem; margin: 0; }
    
    /* Contenedor del QR y del cuadro pequeño */
    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      animation: aparecer 1s ease-out;
    }
    
    .qr-container img {
      width: 180px;
      height: auto;
      border: 4px solid #38bdf8;
      border-radius: 15px;
      background: white;
      padding: 10px;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    }

    /* EL CUADRADITO PEQUEÑO DEBAJO DEL QR */
    .recent-box {
      margin-top: 15px;
      width: 320px;
      background: #1e293b;
      border: 2px dashed #38bdf8;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      min-height: 50px;
      transition: all 0.3s ease;
    }
    .recent-label {
      font-size: 0.8rem;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
      display: block;
    }
    #ultima-idea {
      font-size: 1.1rem;
      font-style: italic;
      color: #f1f5f9;
    }

    /* Animación de "foco" cuando llega algo nuevo al cuadradito */
    .nuevo-mensaje {
      animation: highlight 1s ease;
    }
    @keyframes highlight {
      0% { transform: scale(1); border-color: #38bdf8; }
      50% { transform: scale(1.05); border-color: #4ade80; }
      100% { transform: scale(1); border-color: #38bdf8; }
    }

    /* Estilo del muro general */
    #muro { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .card { background: #1e293b; border-left: 5px solid #38bdf8; padding: 20px; border-radius: 10px; width: 300px; animation: aparecer 0.5s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    
    @keyframes aparecer { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .card p { margin: 0; font-size: 1.2rem; line-height: 1.4; }
  </style>
</head>
<body>
  <header>
    <h1>Stand ingeniería CCCB</h1>
    <p style="font-size: 1.5rem; color: #94a3b8;">Ideas para mejorar nuestra comunidad</p>
  </header>

  <div class="qr-container">
    <img src="unitag_qrcode_standard.png" alt="QR para votar">
    
    <div class="recent-box" id="box-alerta">
      <span class="recent-label">Recién enviado:</span>
      <div id="ultima-idea">Esperando ideas...</div>
    </div>
  </div>

  <div id="muro">
    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://stand-ingenieria-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const muro = document.getElementById('muro');
    const ultimaIdeaDiv = document.getElementById('ultima-idea');
    const boxAlerta = document.getElementById('box-alerta');

    onChildAdded(ref(db, 'propuestas'), (snapshot) => {
      const data = snapshot.val();
      
      // 1. Actualizar el "cuadradito pequeño"
      ultimaIdeaDiv.textContent = `"${data.texto}"`;
      
      // Efecto visual de que ha llegado algo nuevo
      boxAlerta.classList.remove('nuevo-mensaje');
      void boxAlerta.offsetWidth; // Truco para reiniciar animación
      boxAlerta.classList.add('nuevo-mensaje');

      // 2. Añadir la tarjeta al muro general
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<p>${data.texto}</p>`;
      muro.prepend(card);
    });
  </script>
</body>
</html>
